name: MRT
options:
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY[sdk=iphonesimulator*]: ""
    CODE_SIGNING_ALLOWED[sdk=iphonesimulator*]: NO
    CODE_SIGNING_REQUIRED[sdk=iphonesimulator*]: NO
targets:
  MRT:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MRT
        excludes:
          - Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.anywherevibe.mrt
        PRODUCT_NAME: MRT
        INFOPLIST_FILE: MRT/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        CODE_SIGN_IDENTITY[sdk=iphonesimulator*]: ""
        CODE_SIGNING_ALLOWED[sdk=iphonesimulator*]: NO
        CODE_SIGNING_REQUIRED[sdk=iphonesimulator*]: NO
    scheme:
      testTargets:
        - MRTTests
  MRTTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    dependencies:
      - target: MRT
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.anywherevibe.mrt.tests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/MRT.app/MRT"
        CODE_SIGN_IDENTITY[sdk=iphonesimulator*]: ""
        CODE_SIGNING_ALLOWED[sdk=iphonesimulator*]: NO
        CODE_SIGNING_REQUIRED[sdk=iphonesimulator*]: NO
